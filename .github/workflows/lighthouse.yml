name: Lighthouse CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000

      - name: Run LHCI autorun
        run: npx --yes @lhci/cli autorun --config=./lhci.config.js

      - name: Upload LHCI reports
        uses: actions/upload-artifact@v4
        with:
          name: lhci-reports
          path: lhci_reports
